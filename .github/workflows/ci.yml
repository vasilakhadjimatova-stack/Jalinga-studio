name: CI

# Har push va PR'да testlarni ishga tushiradi — sifat kafolati.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bog'liqliklar
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Testlar (pytest)
        env:
          SECRET_KEY: ci-test-secret
          ADMIN_CODE: "111111"
          DISABLE_BOT: "1"
        run: python -m pytest tests/ -q
