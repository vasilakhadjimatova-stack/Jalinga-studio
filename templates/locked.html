<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Jalinga Studio — vaqtincha to'xtatilgan</title>
<style>
  /* Mustaqil sahifa — static/CDN'ga bog'lanmaydi (kesh/tarmoq muammosiz) */
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0B0D12;color:#E8EAF0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    padding:max(24px,env(safe-area-inset-top)) 20px max(24px,env(safe-area-inset-bottom))}
  .card{max-width:440px;width:100%;text-align:center;background:#12151D;
    border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:44px 32px;
    box-shadow:0 24px 70px rgba(0,0,0,.5)}
  .logo{font-weight:800;font-size:15px;letter-spacing:3px;color:#F0A831;
    text-transform:uppercase;margin-bottom:26px}
  .logo::before{content:"";display:inline-block;width:9px;height:9px;
    border-radius:50%;background:#F0A831;margin-right:9px;vertical-align:1px;
    animation:blink 2.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
  .ico{width:74px;height:74px;border-radius:50%;margin:0 auto 22px;
    background:rgba(240,168,49,.1);border:1px solid rgba(240,168,49,.25);
    display:flex;align-items:center;justify-content:center}
  .ico svg{width:32px;height:32px;stroke:#F0A831}
  h1{font-size:21px;font-weight:800;margin-bottom:10px}
  p{font-size:14px;line-height:1.65;color:#9AA3B5}
  .sub{margin-top:22px;padding-top:20px;border-top:1px solid rgba(255,255,255,.07);
    font-size:12px;color:#6B7489}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Jalinga Studio</div>
    <div class="ico">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Dastur vaqtincha to'xtatilgan</h1>
    <p>Xizmat ayni damda faol emas.<br>
       Qayta yoqish bo'yicha administrator bilan bog'laning.</p>
    <div class="sub">Ma'lumotlaringiz xavfsiz saqlanmoqda</div>
  </div>
</body>
</html>
