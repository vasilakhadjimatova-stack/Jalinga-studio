{# Moliya bo'limi ichki navigatsiyasi #}
<style>
.ftabs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.ftab{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:11px;
  font-size:12.5px;font-weight:700;color:var(--txt2);border:1px solid var(--line);
  background:var(--surface2);transition:.16s}
.ftab i{font-size:15px}
.ftab:hover{color:var(--txt);border-color:var(--brand)}
.ftab.on{background:linear-gradient(135deg,var(--brand),var(--brand-dk));color:#151004;
  border-color:transparent;box-shadow:0 5px 16px rgba(240,168,49,.28)}
.ftab.gear{margin-left:auto}
@media(max-width:820px){.ftab.gear{margin-left:0}}
</style>
<div class="ftabs">
  <a href="/finance" class="ftab {% if request.path=='/finance' %}on{% endif %}"><i class="icon-layout-dashboard"></i> Panel</a>
  <a href="/finance/transactions" class="ftab {% if request.path.startswith('/finance/transactions') %}on{% endif %}"><i class="icon-list"></i> Jurnal</a>
  <a href="/finance/dds" class="ftab {% if request.path.startswith('/finance/dds') %}on{% endif %}"><i class="icon-table-2"></i> Pul oqimi (ДДС)</a>
  <a href="/finance/calendar" class="ftab {% if request.path.startswith('/finance/calendar') %}on{% endif %}"><i class="icon-calendar-clock"></i> To'lov kalendari</a>
  <a href="/finance/analysis" class="ftab {% if request.path.startswith('/finance/analysis') %}on{% endif %}"><i class="icon-chart-pie"></i> Tahlil</a>
  <a href="/finance/debts" class="ftab {% if request.path.startswith('/finance/debts') %}on{% endif %}"><i class="icon-hand-coins"></i> Qarzlar</a>
  <a href="/finance/dividends" class="ftab {% if request.path.startswith('/finance/dividends') %}on{% endif %}"><i class="icon-crown"></i> Dividendlar</a>
  <a href="/finance/payments" class="ftab {% if request.path.startswith('/finance/payments') %}on{% endif %}"><i class="icon-receipt"></i> Studiya to'lovlari</a>
  <a href="/finance/settings" class="ftab gear {% if request.path.startswith('/finance/settings') %}on{% endif %}"><i class="icon-settings"></i> Sozlamalar</a>
</div>
